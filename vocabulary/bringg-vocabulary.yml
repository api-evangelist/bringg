keyConcepts:
- name: Task / Order
  description: A unit of delivery work tracked from creation through completion or cancellation.
- name: Run
  description: A route — an ordered sequence of orders assigned to a driver and vehicle.
- name: Waypoint
  description: An origin or destination stop on an order.
- name: Service Plan
  description: A bundle of operational requirements, time windows, notifications, and branding applied to orders.
- name: Service Area
  description: A geographic polygon used to route orders to teams and enforce delivery rules.
- name: Delivery Block
  description: A shift slot drivers commit to working.
- name: Delivery Hub
  description: Bringg's third-party fleet orchestration layer for routing orders to delivery partners and self-integrated fleets.
- name: Quotes And Availability
  description: API surface for retrieving multi-carrier quotes and capacity before placing an order.
- name: Floating Inventory
  description: Inventory items not associated with a specific order, useful for upsell or chain-of-custody tracking.
- name: Bringg Services
  description: Tokenless, GUID-based URLs merchants can issue for limited operations.
