- type: Features
  data:
  - Last-mile delivery orchestration across own fleet and third-party fleets in a
    single platform
  - Modular product suite — Shopping Experience, Plan, Dispatch, Drive, Delivery Experience
  - Bringg Connect carrier network with 250+ third-party, crowdsourced, and autonomous
    carriers across 70+ countries
  - Automation Center for no-code workflow automation
  - Intelligence module for dashboards, reporting, and cost/profit/driver-performance
    insights
  - REST APIs for orders, runs, drivers, vehicles, service areas, service plans, planned
    delivery windows, blackouts, packages, inventory, floating inventory
  - 50+ outbound webhook event types covering order, driver, run, customer, waypoint,
    and inventory lifecycle
  - OAuth 2.0 Client Credentials Grant authentication with configurable token TTLs
    (default 30 min write, 4 hr read)
  - Regional deployments on Google Cloud Platform (US2, US3, US4, EU2, EU3) with per-region
    status and billing
  - JSONL bulk upload pipeline (prepare/upload/process/results) for large data loads
  - Bringg Driver App (iOS, Android) with offline support, geofence-powered visibility,
    and configurable workflows
  - Bringg Dispatcher web app and JavaScript SDK for embedded dispatch UX
  - Bringg Services — tokenless, GUID-based URLs for limited merchant operations without
    auth
  - Quotes and Availability API for multi-carrier quoting before order placement
  - Recurring orders, delivery blocks, vehicle profiles, parking spots, and service-area
    polygons
  - Statuspage at status.bringg.com with per-region component status across 13 components
    (Auth, API, Customer Experience, Delivery Partners, Dispatch, Driver App, Geolocation,
    Infrastructure, Inventory, Notifications, Planning, Reporting, Billing)
  - Used by enterprise retailers including Best Buy, AutoZone, ASDA, Wegmans, FedEx
    Office, Metro, uBreakiFix, and B&Q
  - 800+ customers and 200 million annual deliveries
