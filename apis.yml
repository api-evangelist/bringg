description: Bringg is a last-mile delivery and fulfillment orchestration platform
  headquartered in Tel Aviv (founded 2013, CEO Guy Bloch). The Bringg platform combines
  modular software (Shopping Experience, Plan, Dispatch, Drive, Delivery Experience,
  Automation Center, Intelligence, Connect) with the Bringg Carrier Network — 250+
  pre-integrated third-party, crowdsourced, and autonomous carriers across 70+ countries
  — to give enterprise retailers and logistics providers a single integration point
  for orchestrating own-fleet and partner-fleet deliveries. Bringg's developer surface
  exposes a REST Delivery Hub API for orders/runs/customers/teams/service areas/service
  plans/delivery slots/blackouts/inventory/packages, a Drivers & Shifts API for users/shifts/delivery-blocks/vehicles,
  a Fleet Partners API for self-integrated carriers, 50+ outbound webhook event types,
  and JavaScript/iOS/Android SDKs powering the Dispatcher and Driver apps. All HTTP
  APIs use OAuth 2.0 Client Credentials Grant against region-specific GCP base URLs
  (US2/US3/US4, EU2/EU3) — visible on status.bringg.com. Bringg counts 800+ customers
  including Best Buy, AutoZone, ASDA, Wegmans, FedEx Office, Metro, uBreakiFix, and
  B&Q, and processes 200 million annual deliveries.
