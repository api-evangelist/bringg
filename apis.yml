    orders (tasks), runs (routes), customers, teams, service areas, service plans,
    planned delivery windows (delivery slots), exclusion windows (blackouts), parking
    spots, packages, inventory, floating inventory, recurring orders, delivery blocks,
    vehicles, and analytics reports. All endpoints use OAuth 2.0 Client Credentials
