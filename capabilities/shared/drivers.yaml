name: bringg-drivers
description: Driver and shift management — login, QR code, shifts, home events, real-time availability, and location updates.
operations:
- operationId: createUser
  method: POST
  path: /services/create_user
- operationId: updateUser
  method: POST
  path: /services/update_user
- operationId: getUsers
  method: GET
  path: /services/get_users
- operationId: logoffUser
  method: POST
  path: /services/logoff_user
- operationId: generateDriverQrCode
  method: POST
  path: /services/generate_driver_qr_code
- operationId: startShift
  method: POST
  path: /services/start_shift
- operationId: endShift
  method: POST
  path: /services/end_shift
- operationId: driverHomeEvents
  method: POST
  path: /services/driver_home_events
- operationId: getRealtimeAvailability
  method: GET
  path: /services/get_realtime_availability
- operationId: updateDriverLocation
  method: POST
  path: /services/update_driver_location
