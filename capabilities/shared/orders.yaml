name: bringg-orders
description: Order lifecycle operations on the Bringg Delivery Hub — create, update, get, cancel, start, end, refund, and external-id maintenance.
operations:
- operationId: createTask
  method: POST
  path: /services/create_task
- operationId: updateTask
  method: POST
  path: /services/update_task
- operationId: getTask
  method: GET
  path: /services/get_task
- operationId: getOpenTasks
  method: GET
  path: /services/get_open_tasks
- operationId: cancelTask
  method: POST
  path: /services/cancel_task
- operationId: startTask
  method: POST
  path: /services/start_task
- operationId: endTask
  method: POST
  path: /services/end_task
- operationId: updateTaskExternalId
  method: POST
  path: /services/update_task_external_id
- operationId: createTaskRefund
  method: POST
  path: /services/create_task_refund
scopes:
- create_task
- update_task
- get_task
- cancel_task
