name: bringg-dispatch
description: Dispatch and assignment operations — release orders, assign drivers and vehicles to runs, check-in/out, and post-optimization retrieval.
operations:
- operationId: releaseTasks
  method: POST
  path: /services/release_tasks
- operationId: assignTask
  method: POST
  path: /services/assign_task
- operationId: assignRunDriver
  method: POST
  path: /services/assign_run_driver
- operationId: assignRunVehicle
  method: POST
  path: /services/assign_run_vehicle
- operationId: unassignRunDriver
  method: POST
  path: /services/unassign_run_driver
- operationId: unassignRunVehicle
  method: POST
  path: /services/unassign_run_vehicle
- operationId: checkIn
  method: POST
  path: /services/checkin
- operationId: checkOut
  method: POST
  path: /services/checkout
- operationId: massCheckout
  method: POST
  path: /services/mass_checkout
- operationId: getPostOptimizationTasks
  method: GET
  path: /services/get_post_optimization_tasks
